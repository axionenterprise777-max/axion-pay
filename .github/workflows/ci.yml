name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi
      - name: Lint
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const deps = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
          if (!scripts.lint) {
            console.log('No lint script defined; skipping.');
            process.exit(0);
          }
          if (/eslint/.test(scripts.lint) && !deps.eslint) {
            console.log('Lint script requires eslint but eslint is not declared; skipping.');
            process.exit(0);
          }
          process.exit(10);
          EOF
          status=$?
          if [ "$status" = "10" ]; then
            npm run lint
          elif [ "$status" = "0" ]; then
            exit 0
          else
            exit "$status"
          fi
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
      - name: Upload build artifact
        if: hashFiles('dist/**', 'build/**', 'out/**', '.next/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            build
            out
            .next
